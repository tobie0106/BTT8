<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Form sách</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f6f9;
        }

        .form-container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #1f2d3d;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }

        .btn-group {
            margin-top: 20px;
            text-align: center;
        }

        button, .btn-back {
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            margin: 5px;
        }

        button {
            background-color: #198754;
            color: white;
        }

        button:hover {
            background-color: #157347;
        }

        .btn-back {
            background-color: #6c757d;
            color: white;
        }

        .btn-back:hover {
            background-color: #5c636a;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2 th:text="${pageTitle}"></h2>

    <form th:action="@{/books/save}" th:object="${book}" method="post">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label for="title">Tên sách</label>
        <input type="text" id="title" th:field="*{title}">
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

        <label for="author">Tác giả</label>
        <input type="text" id="author" th:field="*{author}">
        <div class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>

        <label for="price">Giá</label>
        <input type="number" step="0.01" id="price" th:field="*{price}">
        <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>

        <label for="publisher">Nhà xuất bản</label>
        <input type="text" id="publisher" th:field="*{publisher}">

        <label for="category">Danh mục</label>
        <input type="text" id="category" th:field="*{category}">
        <div class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>

        <label for="quantity">Số lượng</label>
        <input type="number" id="quantity" th:field="*{quantity}">
        <div class="error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>

        <div class="btn-group">
            <button type="submit">Lưu</button>
            <a class="btn-back" th:href="@{/books}">Quay lại</a>
        </div>
    </form>
</div>
</body>
</html>
